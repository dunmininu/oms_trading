# OMS Trading - Docker Compose Configuration
# Optimized for development with hot-reloading (bind=true)

x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ./backend:/app/backend
    - ./logs:/app/logs
    - ./media:/app/media
    - ./staticfiles:/app/staticfiles
  env_file: .env
  environment: &app-env
    DJANGO_SETTINGS_MODULE: apps.core.settings.dev
    DATABASE_URL: postgresql://postgres:postgres@postgres:5432/oms_trading_dev
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    DEBUG: "true"
    LOAD_INITIAL_DATA: "true"
    PATH: "/opt/venv/bin:$PATH"
    VIRTUAL_ENV: "/opt/venv"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - oms_network
  restart: unless-stopped

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: oms_postgres
    environment:
      POSTGRES_DB: oms_trading_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oms_trading_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - oms_network

  # Redis Cache and Message Broker
  redis:
    image: redis:7-alpine
    container_name: oms_redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - oms_network

  # Interactive Brokers Gateway (Simulation)
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    platform: linux/amd64
    container_name: oms_ib_gateway
    environment:
      TWS_USERID: ${IB_USERNAME:-edemo}
      TWS_PASSWORD: ${IB_PASSWORD:-demouser}
      TRADING_MODE: paper
      VNC_SERVER_PASSWORD: ${VNC_PASSWORD:-oms123}
      TWS_ACCEPT_INCOMING: true
      TWS_PORT: 4001
      TWS_API_PORT: 7497
    ports:
      - "7498:7497"  # IB API port
      - "4002:4001"  # TWS port
      - "5901:5900"  # VNC port for GUI access
    volumes:
      - ib_data:/root/Jts
    restart: unless-stopped
    networks:
      - oms_network
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/7497'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Main Django Web Application
  web:
    <<: *app-base
    container_name: oms_web
    command: python manage.py runserver 0.0.0.0:8010
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker for Background Tasks
  celery-worker:
    <<: *app-base
    container_name: oms_celery_worker
    command: /opt/venv/bin/celery -A apps.core worker --loglevel=info --concurrency=4
    environment:
      <<: *app-env
      IB_CLIENT_ID: 2
      C_FORCE_ROOT: "true"

  # Celery Beat Scheduler
  celery-beat:
    <<: *app-base
    container_name: oms_celery_beat
    command: /opt/venv/bin/celery -A apps.core beat --loglevel=info --scheduler=django_celery_beat.schedulers:DatabaseScheduler
    environment:
      <<: *app-env
      IB_CLIENT_ID: 3
      C_FORCE_ROOT: "true"

  # Flower - Celery Monitoring
  flower:
    <<: *app-base
    container_name: oms_flower
    command: /opt/venv/bin/celery -A apps.core flower --port=5555 --broker=redis://redis:6379/1
    ports:
      - "5556:5555"

# Named Volumes for Data Persistence
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ib_data:
    driver: local

# Custom Network
networks:
  oms_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
