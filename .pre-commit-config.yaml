# Pre-commit configuration for OMS Trading
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.4
    hooks:
      - id: ruff
        args: [--fix, --unsafe-fixes]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies: [
          "django-stubs",
          "pytest",
          "types-requests",
          "types-python-dateutil",
          "types-redis",
          "types-pytz",
          "celery",
          "django-environ",
          "ib-insync",
          "pydantic",
          "djangorestframework",
          "django-celery-results",
          "django-celery-beat",
          "pandas",
          "numpy",
          "scipy",
          "django>=5.1.10",
          "django-ninja",
          "structlog",
          "httpx",
          "django-filter",
          "django-extensions",
          "django-cors-headers",
          "typing_extensions",
          "django-stubs-ext"
        ]
        args: [--config-file=pyproject.toml]
        exclude: ^(backend/apps/.*/migrations/|backend/tests/)
